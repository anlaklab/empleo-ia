[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "find node_modules -maxdepth 1 -not -name '.cache' -not -name 'node_modules' -exec rm -rf {} + && rm -f package-lock.json && npm install && npm run build",
  # Validate our Caddyfile BEFORE swapping it in. If syntax is invalid, the
  # build fails here with a clear error (instead of Bad Gateway in runtime).
  "caddy validate --adapter caddyfile --config /app/Caddyfile",
  # Overwrite Nixpacks' auto-generated Caddyfile (SPA-fallback) with ours.
  "cp /app/Caddyfile /assets/Caddyfile"
]
