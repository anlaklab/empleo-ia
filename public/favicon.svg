<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Treemap-style grid representing job sectors + AI vulnerability -->
  <rect width="32" height="32" rx="4" fill="#1a1a1a"/>
  <!-- Large block (high vulnerability) -->
  <rect x="2" y="2" width="17" height="12" rx="1.5" fill="#c4703c"/>
  <!-- Medium block -->
  <rect x="21" y="2" width="9" height="12" rx="1.5" fill="#8b9a7b"/>
  <!-- Bottom left -->
  <rect x="2" y="16" width="9" height="14" rx="1.5" fill="#b8a070"/>
  <!-- Bottom middle -->
  <rect x="13" y="16" width="8" height="14" rx="1.5" fill="#6a8a9a"/>
  <!-- Bottom right -->
  <rect x="23" y="16" width="7" height="8" rx="1.5" fill="#9a6a6a"/>
  <!-- Small block bottom-right -->
  <rect x="23" y="26" width="7" height="4" rx="1.5" fill="#7a8a6a"/>
</svg>
